backend:
  image:
    repository: 23127206/yas-all-in-one
    tag: latest
    pullPolicy: Always

  nameOverride: media
  fullnameOverride: media
  
  databaseName: media
  
  ingress:
    enabled: false

  extraVolumes:
    - name: media-application
      configMap:
        name: media-application-configmap
  extraVolumeMounts:
    - name: media-application
      mountPath: /opt/yas/media
  extraApplicationConfigPaths:
    - /opt/yas/media/media-application.yaml