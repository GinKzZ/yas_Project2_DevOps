# QUAN TRỌNG: Phải có dấu | để biến cụm phía dưới thành 1 String
applicationConfig: |
  server:
    shutdown: "graceful"
    port: "80"
  management:
    otlp:
      tracing:
        endpoint: "http://opentelemetry-collector.observability:4318/v1/traces"
    server:
      port: "8090"
    health:
      readinessstate:
        enabled: "true"
      livenessstate:
        enabled: "true"
    tracing:
      sampling:
        probability: "1.0"
  spring:
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: "http://identity.yas.local.com/realms/Yas"
    datasource:
      url: "jdbc:postgresql://postgres-postgresql:5432/"
      username: "${POSTGRESQL_USERNAME}"
      password: "${POSTGRESQL_PASSWORD}"
    kafka:
      bootstrap-servers: "kafka-cluster-kafka-brokers.kafka:9092"

  yas:
    services:
      cart: "http://cart/cart"
      customer: "http://customer/customer"
      inventory: "http://inventory/inventory"
      location: "http://location/location"
      media: "http://media/media"
      order: "http://order/order"
      payment: "http://payment/payment"
      product: "http://product/product"
      promotion: "http://promotion/promotion"
      rating: "http://rating/rating"
      search: "http://search/search"
      tax: "http://tax/tax"
      delivery: "http://delivery/delivery"
      webhook: "http://webhook/webhook"

# Các cấu hình khác cũng cần dấu | nếu chart yêu cầu tpl
gatewayRoutesConfig: |
  spring:
    cloud:
      gateway:
        routes:
          - id: product_api
            uri: "http://product"
            predicates:
              - Path=/api/product/**

sampledataApplicationConfig: |
  spring:
    datasource:
      product:
        url: "jdbc:postgresql://postgres-postgresql:5432/product"
      media:
        url: "jdbc:postgresql://postgres-postgresql:5432/media"

reloader:
  nameOverride: "yas-reloader"
  fullnameOverride: "yas-reloader"
  reloader:
    watchGlobally: false