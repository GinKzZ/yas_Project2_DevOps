# ĐỂ DẠNG MAP (KHÔNG CÓ DẤU |) - Vì template dùng toYaml
applicationConfig:
  server:
    shutdown: "graceful"
    port: "80"
  management:
    server:
      port: "8090"
    health:
      readinessstate:
        enabled: "true"
      livenessstate:
        enabled: "true"
  spring:
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: "http://identity.yas.local.com/realms/Yas"
    datasource:
      url: "jdbc:postgresql://postgres-postgresql:5432/"
      username: "${POSTGRESQL_USERNAME}"
      password: "${POSTGRESQL_PASSWORD}"
    kafka:
      bootstrap-servers: "kafka-cluster-kafka-brokers.kafka:9092"
  yas:
    services:
      cart: "http://cart/cart"
      customer: "http://customer/customer"
      inventory: "http://inventory/inventory"
      location: "http://location/location"
      media: "http://media/media"
      order: "http://order/order"
      product: "http://product/product"
      recommendation: "http://recommendation/recommendation"

# BẮT BUỘC PHẢI CÓ DẤU | - Vì template dùng trực tiếp (không qua toYaml)
logbackConfig: |
  <?xml version="1.0" encoding="UTF-8" ?>
  <Configuration>
    <root level="INFO">
      <appender-ref ref="CONSOLE" />
    </root>
  </Configuration>

# Bổ sung các Map còn thiếu để template không bị null
gatewayRoutesConfig:
  spring:
    cloud:
      gateway:
        routes: []

backofficeBffExtraConfig: {}
storefrontBffExtraConfig: {}
mediaApplicationConfig: {}
customerApplicationConfig: {}
searchApplicationConfig: {}
cartApplicationConfig: {}
orderApplicationConfig: {}
paymentApplicationConfig: {}
paymentPaypalApplicationConfig: {}
productApplicationConfig: {}
recommendationApplicationConfig: {}
sampledataApplicationConfig: {}

reloader:
  nameOverride: "yas-reloader"
  fullnameOverride: "yas-reloader"
  reloader:
    watchGlobally: false